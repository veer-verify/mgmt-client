        <span class="form-heading">Associate Device</span>
    </div>

    <div>
        <form autocomplete="off" [formGroup]="addAssetForm" (ngSubmit)="createIssueForFaq()">

                <div class="col-lg-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Select site</mat-label>
                        <input matInput #siteIdInput [matAutocomplete]="site" [(ngModel)]="siteId" (keyup)="searchSites($event)" formControlName="siteId">
                        <button matSuffix mat-icon-button>
                        <mat-icon>arrow_drop_down</mat-icon>
                        </button>
                        <mat-autocomplete #site="matAutocomplete">
                        <mat-option *ngFor="let item of siteData | search: siteSearch" [value]="item.siteId" (click)="listZonesForSiteId(item)"> {{ item.siteId }}  {{ item.sitename }}</mat-option>
                        </mat-autocomplete>
                    </mat-form-field>
                    </div>
                    <!-- <div class="col-lg-6">
                        <mat-form-field appearance="outline" class="w-100">
                            <mat-label>Select ZoneId</mat-label>
                            <input matInput #ZoneInput [matAutocomplete]="Zone" [(ngModel)]="ZoneId" (keyup)="searchSites1($event)" formControlName="ZoneId">
                            <button matSuffix mat-icon-button>

                <div class="col-lg-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>ZoneId</mat-label>
                        <mat-select formControlName="zoneId">
                            <mat-option *ngFor="let item of listZonesForSiteIdData" [value]="item.zoneId">{{item.zoneName}}</mat-option>
                        </mat-select>
                        <mat-error>ZoneId is required</mat-error>
                    </mat-form-field>
                </div>
                <div class="col-lg-6 col-md-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Device Count</mat-label>
                        <input matInput formControlName="sensorDeviceIdCount" type="number">
                        <mat-error>Device Count is required</mat-error>
                    </mat-form-field>
                </div>
                <div class="col-lg-6 col-md-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Sensor Name</mat-label>
                        <input matInput formControlName="sensorName">
                        <mat-error>Sensor Name is required</mat-error>
                    </mat-form-field>
                </div>
                <div class="col-lg-12 col-md-12">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Remarks</mat-label>
                        <input matInput formControlName="remarks">
                    </mat-form-field>
                </div>
                <div class="text-center my-5">
                    <button class="add-btn">ADD</button>
                </div>
            </div>
        </form>
