<div class="row formModal">
    <div class="col-lg-6 col-4"></div>
    <div class="col-lg-6 col-8 add-form" id="camera" @inOutPaneAnimation>
    <div>
        <a class="close-main pointer" (click)="closeForm()"><img src="assets/icons/close_form.svg" /></a>
        <span class="form-heading">Configure Zone To Site</span>
    </div>
    <!-- form -->
    <div>
        <form autocomplete="off" [formGroup]="addAssetForm">
            <div class="row">
                <!-- <div class="col-lg-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Select Site</mat-label>
                        <mat-select formControlName="siteId">
                            <mat-option *ngFor="let item of siteData" [value]="item.siteId">{{item.siteId}} - {{item.siteName}}</mat-option>
                        </mat-select>
                        <mat-error>site is required</mat-error>
                    </mat-form-field>
                </div> -->
                <div class="col-lg-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Select site</mat-label>
                        <input matInput #siteIdInput [matAutocomplete]="site" [(ngModel)]="siteId" (keyup)="searchSites($event)" formControlName="siteId">
                        <button matSuffix mat-icon-button>
                        <mat-icon>arrow_drop_down</mat-icon>
                        </button>
                        <mat-autocomplete #site="matAutocomplete">
                        <mat-option *ngFor="let item of siteData | search: siteSearch" [value]="item.siteId"> {{ item.siteId }}  {{ item.sitename }}</mat-option>
                        </mat-autocomplete>
                    </mat-form-field>
                    </div>
                <div class="col-lg-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>ZoneId</mat-label>
                        <mat-select formControlName="zoneId">
                            <mat-option [value]="null">Add Zone</mat-option>
                            <mat-option *ngFor="let item of zonesList" [value]="item.zoneId">{{item.zoneName}}</mat-option>
                        </mat-select>
                        <mat-error>ZoneId is required</mat-error>
                    </mat-form-field>
                </div>

                <div class="col-lg-12" formGroupName="addZoneForm" *ngIf="addAssetForm.get('zoneId').value == null">
                    <div class="row">
                        <div class="col-lg-5">
                            <mat-form-field appearance="outline" class="w-100">
                                <mat-label>zoneName</mat-label>
                                <input matInput formControlName="zoneName">
                            </mat-form-field>
                        </div>
                        <!-- <div class="col-lg-2"><button (click)="createZone()">Submit</button></div> -->
                    </div>
                </div>

                <div class="col-lg-12">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Remarks</mat-label>
                        <input matInput formControlName="remarks">
                    </mat-form-field>
                </div>
                <div class="text-center my-5">
                    <button class="add-btn" (click)="createZone()" *ngIf="addAssetForm.get('zoneId').value == null">ADD</button>
                    <button class="add-btn" (click)="createIssueForFaq()" *ngIf="addAssetForm.get('zoneId').value != null">ADD</button>
                </div>
            </div>
        </form>
    </div>
    <!-- /form -->
    </div>
</div>
